<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self' data:; img-src 'self' data:;" />
  <title>Agent-X</title>
  <link rel="stylesheet" href="xterm/xterm.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #1e1e1e; }
    #terminal { width: 100%; height: 100%; }
    .xterm { height: 100%; padding: 4px; }
  </style>
</head>
<body>
  <div id="terminal"></div>
  <script src="xterm/xterm.js"></script>
  <script src="xterm/xterm-addon-fit.js"></script>
  <script src="xterm/xterm-addon-web-links.js"></script>
  <script>
    const term = new Terminal({
      cursorBlink: true,
      cursorStyle: 'bar',
      fontSize: 14,
      fontFamily: "'Menlo', 'Monaco', 'Courier New', monospace",
      theme: {
        background: '#1e1e1e',
        foreground: '#d4d4d4',
        cursor: '#d4d4d4',
        selection: '#264f78',
        black: '#1e1e1e',
        red: '#f44747',
        green: '#6a9955',
        yellow: '#dcdcaa',
        blue: '#569cd6',
        magenta: '#c586c0',
        cyan: '#4ec9b0',
        white: '#d4d4d4',
      },
      allowTransparency: false,
    });

    const fitAddon = new FitAddon.FitAddon();
    term.loadAddon(fitAddon);

    const webLinksAddon = new WebLinksAddon.WebLinksAddon();
    term.loadAddon(webLinksAddon);

    term.open(document.getElementById('terminal'));
    fitAddon.fit();

    term.onData((data) => {
      window.agentx.pty.write(data);
    });

    window.addEventListener('resize', () => {
      fitAddon.fit();
      const dims = fitAddon.proposeDimensions();
      if (dims) window.agentx.pty.resize(dims.cols, dims.rows);
    });

    window.agentx.pty.spawn().then((result) => {
      if (!result.ok) {
        term.write(`\r\n\x1b[31mFailed to start Agent-X: ${result.error}\x1b[0m\r\n`);
        return;
      }

      window.agentx.pty.onData((data) => {
        term.write(data);
      });

      window.agentx.pty.onExit(({ exitCode }) => {
        term.write(`\r\n\x1b[33mAgent-X exited with code ${exitCode}\x1b[0m\r\n`);
      });
    });
  </script>
</body>
</html>
